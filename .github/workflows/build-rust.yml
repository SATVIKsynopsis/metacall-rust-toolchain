name: Build Patched Rust Toolchain

on:
  workflow_dispatch:

jobs:
  build-rust:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            curl \
            python3 \
            build-essential \
            cmake \
            ninja-build

      - name: Clone Rust
        run: |
          git clone https://github.com/rust-lang/rust.git
          cd rust
          git checkout main

      - name: Configure Rust
        run: |
          cd rust
          cat > config.toml <<EOF
          [llvm]
          download-ci-llvm = true

          [build]
          extended = true

          [rust]
          codegen-units = 1
          EOF

      - name: Find TLS flag
        run: |
          cd rust
          grep -R "tls-model=initial-exec" src || true

      - name: Patch TLS flag
        run: |
          cd rust
          sed -i '/tls-model=initial-exec/d' src/bootstrap/src/bin/rustc.rs

      - name: Verify patch
        run: |
          cd rust
          grep -R "tls-model=initial-exec" src || true

      - name: Build Rust
        run: |
          cd rust
          python3 x.py build --stage 2 compiler/rustc

      - name: Upload toolchain
        uses: actions/upload-artifact@v4
        with:
          name: patched-rust-toolchain
          path: rust/build/x86_64-unknown-linux-gnu/stage2

  validate-toolchain:
    needs: build-rust
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm-slim

    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y curl build-essential

      - name: Download toolchain
        uses: actions/download-artifact@v4
        with:
          name: patched-rust-toolchain
          path: /toolchain

      - name: Fix permissions
        run: |
          chmod -R 755 /toolchain || true
          find /toolchain -type f -name "rustc" -exec chmod +x {} \;
          find /toolchain -type f -name "cargo" -exec chmod +x {} \;

      - name: Install rustup
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y

      - name: Add cargo to PATH
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Link patched toolchain
        run: |
          rustup toolchain link patched /toolchain

      - name: Activate toolchain
        run: |
          rustup override set patched

      - name: Validate toolchain
        run: |
          rustc -Vv
          cargo -V

          cargo new hello
          cd hello

          cat > src/main.rs <<EOF
          fn main() {
              println!("patched rust toolchain works");
          }
          EOF

          cargo build -v
          ./target/debug/hello